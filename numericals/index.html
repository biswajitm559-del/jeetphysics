<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Numerical Solutions — JeetPhysics</title>
  <meta name="description" content="Solved numerical problems with step-by-step solutions for competitive physics exams — JEE, NEET, JAM, CSIR-NET, GATE, CUET." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet" />

  <!-- KaTeX -->

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>

  <link rel="stylesheet" href="exam-styles.css" />
</head>
<body>

<!-- ═══ TOP NAV ═══ -->
<nav class="exam-nav" id="examNav">
  <a href="../index.html" class="exam-nav-back">
    <i class="ph ph-arrow-left"></i>
    <span class="brand-jeet">Jeet</span><span class="brand-physics">Physics</span>
  </a>
  <div class="exam-nav-links" id="examNavLinks">
    <a href="?exam=jee-main" class="exam-nav-link" data-exam="jee-main">JEE Main</a>
    <a href="?exam=jee-advanced" class="exam-nav-link" data-exam="jee-advanced">JEE Advanced</a>
    <a href="?exam=neet" class="exam-nav-link" data-exam="neet">NEET</a>
    <a href="?exam=jam-physics" class="exam-nav-link" data-exam="jam-physics">JAM Physics</a>
    <a href="?exam=jam-chemistry" class="exam-nav-link" data-exam="jam-chemistry">JAM Chemistry</a>
    <a href="?exam=csir-net" class="exam-nav-link" data-exam="csir-net">CSIR-NET</a>
    <a href="?exam=gate-physics" class="exam-nav-link" data-exam="gate-physics">GATE Physics</a>
    <a href="?exam=cuet-science" class="exam-nav-link" data-exam="cuet-science">CUET Science</a>
  </div>
  <button class="exam-nav-hamburger" id="examHamburger" aria-label="Toggle menu">
    <i class="ph ph-list"></i>
  </button>
</nav>

<!-- ═══ EXAM HEADER ═══ -->
<header class="exam-header" id="examHeader">
  <!-- Rendered by JS -->
</header>

<!-- ═══ MAIN CONTENT ═══ -->
<div class="exam-layout">
  <!-- Main Column -->
  <main class="exam-main">
    <!-- Search & Filters -->
    <div class="exam-filters" id="examFilters">
      <div class="exam-search-wrapper">
        <i class="ph ph-magnifying-glass search-icon"></i>
        <input type="text" class="exam-search" id="examSearch" placeholder="Search questions by topic, keyword..." />
      </div>

      <div class="filter-row">
        <div class="filter-group">
          <span class="filter-label">Chapter:</span>
          <div class="filter-pills" id="chapterFilters">
            <!-- Rendered by JS -->
          </div>
        </div>

        <div class="filter-group">
          <span class="filter-label">Difficulty:</span>
          <div class="filter-pills" id="difficultyFilters">
            <button class="filter-pill active" data-difficulty="all">All</button>
            <button class="filter-pill pill-easy" data-difficulty="easy">Easy</button>
            <button class="filter-pill pill-moderate" data-difficulty="moderate">Moderate</button>
            <button class="filter-pill pill-advanced" data-difficulty="advanced">Advanced</button>
          </div>
        </div>
      </div>

      <div class="results-count" id="resultsCount">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Problems List -->
    <div class="problems-list" id="problemsList">
      <!-- Rendered by JS -->
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination">
      <!-- Rendered by JS -->
    </div>
  </main>

  <!-- Sidebar -->
  <aside class="exam-sidebar" id="examSidebar">
    <!-- Rendered by JS -->
  </aside>
</div>

<!-- ═══ FOOTER ═══ -->
<footer class="exam-footer">
  <div class="exam-footer-inner">
    <p>© 2026 <span style="font-family:'Playfair Display',serif;font-style:italic;color:#bfdbff;">Jeet</span><span style="color:#fbbf24;font-weight:700;">Physics</span> — Numerical Solutions Portal</p>
    <div class="exam-footer-links">
      <a href="../index.html">Home</a>
      <a href="../index.html#subjects">Subjects</a>
      <a href="../index.html#formulae">Formulae</a>
      <a href="../index.html#resources">Resources</a>
    </div>
  </div>
</footer>

<!-- ═══ BACK TO TOP ═══ -->
<button class="exam-back-top" id="examBackTop" aria-label="Back to top">
  <i class="ph ph-arrow-up"></i>
</button>

<script src="exam-data.js"></script>
</body>
</html>
